<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duel Atlas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <canvas id="bgCanvas"></canvas>
  <div class="veil"></div>

  <header class="header">
    <h1>DUEL ATLAS</h1>
    <p>Mythic lightsaber moments, reimagined.</p>
  </header>

  <main class="layout">
    <section class="hero">
      <div class="hero-overlay">
        <h2>Elegy Of Light And Shadow</h2>
        <p>Dark cinematic panels inspired by the duel art style you shared.</p>
      </div>
    </section>

    <section>
      <div class="toolbar">
        <button id="regenScenes">Generate More Scenes</button>
        <button id="shufflePalette">Shift Mood</button>
      </div>
      <div id="sceneGrid" class="scene-grid"></div>
    </section>
  </main>

  <template id="sceneCard">
    <article class="card">
      <div class="card-art"></div>
      <div class="card-meta">
        <h3></h3>
        <p></p>
      </div>
    </article>
  </template>

  <script src="./script.js"></script>
</body>
</html>
